    body {

    /* --- Навигация --- */
    .sticky-nav { 
        position: sticky; 
        top: 0; 
        z-index: 100; 
        background-color: rgba(244, 244, 244, 0.7); 
        backdrop-filter: blur(10px); 
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
    }

    /* --- Адаптивная типографика --- */

        line-height: 0.85; 
        letter-spacing: -0.05em; 
        text-transform: uppercase; 
        font-weight: 900; 
    }

    /* --- Адаптивная сетка --- */
    .swiss-grid { 
        display: flex; 
        flex-direction: column; 
        gap: 2rem; 
    }
    @media (min-width: 768px) {
        .swiss-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 1.5rem; 
        }
    }

    /* --- Блок логотипов в шапке --- */
    .tech-logo-wrapper {
        position: relative;
        width: clamp(280px, 40vw, 500px); 
        height: clamp(280px, 40vw, 500px);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    .tech-logo-base {
        width: 60%; 
        height: auto;
        opacity: 0.9;
        filter: grayscale(1);
        transition: all 0.6s ease;
        z-index: 10;
    }

    /* Сателлиты (MongoDB & MySQL) */
    .tech-logo-satellite {
        position: absolute;
        width: 40%; 
        height: auto;
        object-fit: contain;
        filter: grayscale(1);
        opacity: 0; /* ПОЛНОСТЬЮ ПРОЗРАЧНЫЕ В ПОКОЕ */
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 5;
        pointer-events: none; /* Не мешают кликам, пока скрыты */
    }

    /* Анимация при наведении на весь Header */
    header:hover .tech-logo-base { 
        filter: grayscale(0); 
        transform: rotate(-5deg) scale(1.05); 
    }

    header:hover .tech-logo-satellite { 
        filter: grayscale(0); 
        opacity: 1; /* ПОЯВЛЯЮТСЯ */
        pointer-events: auto;
    }

    /* Эффект разлета */
    header:hover #logo-mongo { transform: translate(-35%, -35%) rotate(-15deg) scale(1.1); }
    header:hover #logo-mysql { transform: translate(35%, 35%) rotate(15deg) scale(1.1); }

    @media (min-width: 1024px) {
        header:hover #logo-mongo { transform: translate(-180px, -140px) rotate(-15deg) scale(1); }
        header:hover #logo-mysql { transform: translate(180px, 140px) rotate(15deg) scale(1); }
    }

    /* --- Стили компонентов --- */
    .section-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #007BFF; margin-bottom: 1rem; display: block; }

    .github-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        background-color: #1A1A1A;
        color: white;
        padding: 1rem 2rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 12px;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 8px 8px 0px 0px #007BFF;
        margin-top: 1.5rem;
    }
    .github-btn:hover { transform: translate(8px, 8px); box-shadow: 0px 0px 0px 0px #007BFF; background-color: #007BFF; }

    .project-media { 
        filter: grayscale(100%);

    .lang-switcher { cursor: pointer; font-weight: bold; transition: opacity 0.3s; }
    .lang-switcher.active { opacity: 1; color: #1A1A1A; text-decoration: underline; }
    .lang-switcher.inactive { opacity: 0.5; color: #9ca3af; text-decoration: none; }

    .zoom-effect:hover { transform: scale(1.03); z-index: 10; position: relative; }

        let currentLang = localStorage.getItem('language') || 'de';
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) element.innerHTML = translations[lang][key];
            });
            document.querySelectorAll('.lang-switcher').forEach(btn => {
                btn.className = btn.getAttribute('data-lang') === lang ? 'lang-switcher active' : 'lang-switcher inactive';
            });
        }
        window.addEventListener('DOMContentLoaded', () => setLanguage(currentLang));
