<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F4F4F4; 
            color: #1A1A1A; 
            line-height: 1.2;
        }

        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(244, 244, 244, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .sticky-nav:hover { background-color: rgba(244, 244, 244, 0.9); }

        .swiss-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
        
        .huge-title { 
            font-size: clamp(2.5rem, 8vw, 7rem); 
            line-height: 0.9; 
            letter-spacing: -0.05em; 
            text-transform: uppercase;
            font-weight: 900;
        }

        .border-black-thick { border-top: 4px solid #1A1A1A; }
        .highlight-green { color: #0F9D58; }

        .project-image-container {
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-origin: center;
            filter: grayscale(100%);
        }
        .project-image-container:hover { 
            filter: grayscale(0%);
            transform: scale(1.03);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.35);
            z-index: 10;
        }

        .lang-switcher {
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
            transition: opacity 0.3s;
        }
        .lang-switcher.active { opacity: 1; color: #1A1A1A; }
        .lang-switcher.inactive { opacity: 0.5; color: #9ca3af; }

        .sheets-logo-big {
            width: 280px;
            height: 280px;
            opacity: 0.9;
            filter: grayscale(1);
            transition: all 0.6s ease;
        }
        header:hover .sheets-logo-big {
            filter: grayscale(0);
            transform: rotate(-5deg) scale(1.05);
        }

        .gsheets-btn-styled {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background-color: #1A1A1A;
            color: white;
            padding: 1rem 2rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            transition: all 0.2s ease-in-out;
            box-shadow: 6px 6px 0px 0px #0F9D58;
            border: 2px solid #1A1A1A;
            cursor: pointer;
            position: relative;
        }

        .gsheets-btn-styled:hover {
            background-color: #0F9D58;
            border-color: #0F9D58;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #0F9D58;
        }

        .gsheets-btn-styled:active {
            transform: translate(6px, 6px);
            filter: brightness(0.9);
        }

        #presentation-container:fullscreen {
            background: black;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

            },

                'title': 'Patient Flow<br>& <span class="highlight-green italic">Growth Analysis</span>',
                'case-study': 'Business Case Study',
                'overview': 'Optimization of operational efficiency and data-driven scaling of medical staff.',
                'impact-metrics': 'Impact Metrics',

                'expand-btn': 'Expand [ ]'
            }
        };

        let currentLang = localStorage.getItem('language') || 'de';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    element.innerHTML = translations[lang][key];
                }
            });
            document.querySelectorAll('.lang-switcher').forEach(btn => {
                btn.className = btn.getAttribute('data-lang') === lang ? 'lang-switcher active' : 'lang-switcher inactive';
            });
        }

        function toggleFullscreen() {
            const elem = document.getElementById('presentation-container');
            if (!document.fullscreenElement) {
                elem.requestFullscreen?.() || elem.webkitRequestFullscreen?.() || elem.msRequestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        window.addEventListener('DOMContentLoaded', () => setLanguage(currentLang));
    </script>
