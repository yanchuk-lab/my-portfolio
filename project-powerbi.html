        let currentLang = localStorage.getItem('language') || 'de';
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) element.innerHTML = translations[lang][key];
            });
            document.querySelectorAll('.lang-switcher').forEach(btn => {
                btn.className = btn.getAttribute('data-lang') === lang ? 'lang-switcher active' : 'lang-switcher inactive';
            });
        }
        window.addEventListener('DOMContentLoaded', () => setLanguage(currentLang));
